<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#1B4DFF;color:#fff;overflow:hidden;position:relative}
.wrap{padding:80px;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
h2{font-size:56px;font-weight:900;line-height:1.35;letter-spacing:-1px;margin-bottom:20px}
.sub{font-size:30px;color:rgba(255,255,255,.65);margin-bottom:56px;line-height:1.5}
.cta-box{background:#fff;color:#111;border-radius:20px;padding:44px 64px;display:inline-block}
.cta-box h3{font-size:36px;font-weight:900;margin-bottom:8px;color:#1B4DFF}
.cta-box p{font-size:26px;color:#666;line-height:1.5}
.cta-box .price{font-size:44px;font-weight:900;color:#111;margin:16px 0 8px}
.cta-box .price span{font-size:28px;color:#999;font-weight:400}
.bottom-info{margin-top:48px;font-size:24px;color:rgba(255,255,255,.45);line-height:1.6}
.brand{position:absolute;bottom:60px;right:80px;font-size:22px;font-weight:700;color:rgba(255,255,255,.35)}
.dots{position:absolute;bottom:64px;left:80px;display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.25)}
.dot.active{background:#fff;width:32px;border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
<h2>등기부등본 읽기,<br>어렵지 않아요</h2>
<p class="sub">그래도 혼자 보기 불안하다면?</p>
<div class="cta-box">
<h3>계약체크</h3>
<p>사진만 찍으면 자동으로 확인해줘요</p>
<div class="price">9,900원 <span>/ 1회</span></div>
</div>
<p class="bottom-info">저장해두고 계약할 때 꺼내보세요 📌</p>
</div>
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
<div class="brand">@contractcheck.kr</div>
</body>
</html>
