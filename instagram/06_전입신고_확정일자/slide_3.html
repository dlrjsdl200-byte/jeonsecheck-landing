<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Pretendard',sans-serif;background:#1A1A2E;color:#fff;overflow:hidden;position:relative}
.accent-bar{position:absolute;left:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#00C9A7,#1B4DFF)}
.wrap{padding:72px 72px 72px 88px;height:100%;display:flex;flex-direction:column}
.label{font-size:22px;font-weight:700;color:#FF6B6B;margin-bottom:8px}
h2{font-size:44px;font-weight:800;letter-spacing:-1px;margin-bottom:20px;line-height:1.3}
h2 em{font-style:normal;color:#FF6B6B}
.timeline{flex:1;display:flex;flex-direction:column;justify-content:center;gap:0;position:relative;padding-left:40px}
.timeline::before{content:'';position:absolute;left:14px;top:80px;bottom:80px;width:3px;background:rgba(255,255,255,.08)}
.tl-item{position:relative;padding:24px 0 24px 44px}
.tl-dot{position:absolute;left:-30px;top:32px;width:14px;height:14px;border-radius:50%;border:3px solid}
.tl-item:nth-child(1) .tl-dot{border-color:#00C9A7;background:#00C9A7}
.tl-item:nth-child(2) .tl-dot{border-color:#1B4DFF;background:#1B4DFF}
.tl-item:nth-child(3) .tl-dot{border-color:#FF6B6B;background:transparent}
.tl-item:nth-child(4) .tl-dot{border-color:#FF6B6B;background:transparent}
.tl-time{font-size:20px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:4px}
.tl-title{font-size:30px;font-weight:800;margin-bottom:6px}
.tl-desc{font-size:24px;color:rgba(255,255,255,.5);line-height:1.5}
.tl-item:nth-child(3) .tl-title,.tl-item:nth-child(4) .tl-title{color:#FF6B6B}
.warn-box{margin-top:24px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.2);border-radius:14px;padding:24px 28px;font-size:24px;color:rgba(255,255,255,.6);line-height:1.6}
.warn-box strong{color:#FF6B6B;font-weight:700}
.bottom{position:absolute;bottom:48px;left:88px;right:72px;display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15)}
.dot.active{background:#00C9A7;width:28px;border-radius:5px}
.brand{font-size:20px;font-weight:600;color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="wrap">
<div>
<div class="label">⏰ 타이밍이 중요</div>
<h2>안 하면 <em>이렇게</em> 됩니다</h2>
</div>
<div class="timeline">
<div class="tl-item">
<div class="tl-dot"></div>
<div class="tl-time">이사 당일</div>
<div class="tl-title">전입신고 + 확정일자 완료 ✓</div>
<div class="tl-desc">다음날 0시부터 대항력 발생</div>
</div>
<div class="tl-item">
<div class="tl-dot"></div>
<div class="tl-time">다음날 0시~</div>
<div class="tl-title">대항력 + 우선변제권 확보</div>
<div class="tl-desc">경매 시 보증금 돌려받을 순서가 생겨요</div>
</div>
<div class="tl-item">
<div class="tl-dot"></div>
<div class="tl-time">만약 안 했다면?</div>
<div class="tl-title">그 사이 근저당이 들어오면</div>
<div class="tl-desc">은행이 먼저, 내 보증금은 후순위로 밀려요</div>
</div>
</div>
<div class="warn-box">
<strong>핵심:</strong> 잔금 치르는 날 = 이사하는 날 = 전입신고하는 날<br>이 3가지가 같은 날이어야 가장 안전해요.
</div>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</body>
</html>
