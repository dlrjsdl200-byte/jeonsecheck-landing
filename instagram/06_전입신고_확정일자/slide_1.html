<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Pretendard',sans-serif;background:#1A1A2E;color:#fff;overflow:hidden;position:relative}
.accent-bar{position:absolute;left:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#00C9A7,#1B4DFF)}
.wrap{padding:100px 80px 80px 100px;height:100%;display:flex;flex-direction:column;justify-content:center}
.tag{display:inline-flex;align-items:center;gap:8px;background:rgba(0,201,167,.12);border:1.5px solid rgba(0,201,167,.3);color:#00C9A7;font-size:24px;font-weight:700;padding:10px 20px;border-radius:50px}
h1{font-size:66px;font-weight:800;line-height:1.35;letter-spacing:-1.5px;margin-top:36px}
h1 .gr{color:#00C9A7}
.sub{font-size:30px;color:rgba(255,255,255,.45);font-weight:400;margin-top:20px;line-height:1.6}
.sub strong{color:rgba(255,255,255,.7);font-weight:600}
.bottom{position:absolute;bottom:60px;left:100px;right:80px;display:flex;justify-content:space-between;align-items:flex-end}
.swipe{font-size:22px;color:rgba(255,255,255,.3)}
.brand{font-size:20px;font-weight:600;color:rgba(255,255,255,.25)}
.dots{display:flex;gap:10px;margin-top:16px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15)}
.dot.active{background:#00C9A7;width:28px;border-radius:5px}
.corner-deco{position:absolute;bottom:160px;right:80px;font-size:140px;opacity:.15;transform:rotate(-10deg)}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="corner-deco">📋</div>
<div class="wrap">
<div>
<span class="tag">🏠 이사 필수</span>
<h1>이사하고 <span class="gr">24시간 안에</span><br>이거 안 하면<br>보증금 날려요</h1>
<p class="sub"><strong>전입신고</strong>랑 <strong>확정일자</strong>,<br>뭔지 모르면 꼭 읽어보세요.</p>
</div>
<div class="bottom">
<div>
<div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="swipe" style="margin-top:12px">밀어서 계속 →</div>
</div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
