<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Pretendard',sans-serif;background:#00C9A7;color:#fff;overflow:hidden;position:relative}
.wrap{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:80px}
h2{font-size:52px;font-weight:800;line-height:1.35;letter-spacing:-1px;margin-bottom:16px}
.sub{font-size:28px;color:rgba(255,255,255,.7);margin-bottom:48px;line-height:1.5}
.cta-box{background:#fff;color:#1A1A2E;border-radius:24px;padding:44px 56px;display:inline-block}
.cta-box h3{font-size:34px;font-weight:800;color:#00C9A7;margin-bottom:6px}
.cta-box p{font-size:24px;color:#888;margin-bottom:16px}
.cta-box .price{font-size:44px;font-weight:900;color:#1A1A2E}
.cta-box .price span{font-size:24px;color:#aaa;font-weight:400}
.save{margin-top:44px;font-size:24px;color:rgba(255,255,255,.55)}
.bottom{position:absolute;bottom:48px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3)}
.dot.active{background:#fff;width:28px;border-radius:5px}
.brand{font-size:20px;font-weight:600;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="wrap">
<h2>전입신고, 확정일자<br>잊지 마세요</h2>
<p class="sub">서류 확인도 자동으로 해드려요</p>
<div class="cta-box">
<h3>계약체크</h3>
<p>사진만 찍으면 30초 자동 확인</p>
<div class="price">9,900원 <span>/ 1회</span></div>
</div>
<p class="save">저장해두고 이사할 때 꺼내보세요 📌</p>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</body>
</html>
