<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Pretendard',sans-serif;background:#F7F7F3;color:#1A1A2E;overflow:hidden;position:relative}
.accent-bar{position:absolute;left:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#00C9A7,#1B4DFF)}
.wrap{padding:72px 72px 72px 88px;height:100%;display:flex;flex-direction:column}
.label{font-size:22px;font-weight:700;color:#1B4DFF;margin-bottom:8px}
h2{font-size:42px;font-weight:800;letter-spacing:-1px;margin-bottom:36px;line-height:1.3}
.summary-area{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px}
.sum-row{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:28px 32px;box-shadow:0 1px 8px rgba(0,0,0,.03)}
.sum-icon{font-size:36px;flex-shrink:0}
.sum-text{flex:1}
.sum-text h4{font-size:26px;font-weight:700;margin-bottom:4px}
.sum-text p{font-size:22px;color:#888;line-height:1.4}
.sum-check{font-size:28px;color:#00C9A7;font-weight:900}
.tip-box{margin-top:28px;background:#E8FFF8;border-radius:16px;padding:28px 32px;font-size:24px;color:#065F46;line-height:1.6}
.tip-box strong{font-weight:800}
.bottom{position:absolute;bottom:48px;left:88px;right:72px;display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.1)}
.dot.active{background:#00C9A7;width:28px;border-radius:5px}
.brand{font-size:20px;font-weight:600;color:rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="wrap">
<div>
<div class="label">요약 체크리스트</div>
<h2>이사 당일 — 이것만 기억하세요</h2>
</div>
<div class="summary-area">
<div class="sum-row">
<div class="sum-icon">🔑</div>
<div class="sum-text"><h4>잔금 지급 + 열쇠 수령</h4><p>등기부등본 한 번 더 확인 (당일 발급!)</p></div>
<div class="sum-check">□</div>
</div>
<div class="sum-row">
<div class="sum-icon">🏠</div>
<div class="sum-text"><h4>짐 옮기고 실제 거주 시작</h4><p>"점유"를 시작해야 대항력 조건 충족</p></div>
<div class="sum-check">□</div>
</div>
<div class="sum-row">
<div class="sum-icon">📋</div>
<div class="sum-text"><h4>주민센터 → 전입신고</h4><p>신분증 + 계약서 사본 지참</p></div>
<div class="sum-check">□</div>
</div>
<div class="sum-row">
<div class="sum-icon">📌</div>
<div class="sum-text"><h4>확정일자 받기</h4><p>전입신고랑 같이 하면 됨 (600원)</p></div>
<div class="sum-check">□</div>
</div>
</div>
<div class="tip-box">
<strong>💡 꿀팁:</strong> 정부24에서 전입신고 온라인으로도 가능해요.<br>다만 확정일자는 주민센터 방문이 확실합니다.
</div>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</body>
</html>
