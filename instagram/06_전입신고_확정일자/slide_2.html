<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Pretendard',sans-serif;background:#F7F7F3;color:#1A1A2E;overflow:hidden;position:relative}
.accent-bar{position:absolute;left:0;top:0;width:8px;height:100%;background:linear-gradient(180deg,#00C9A7,#1B4DFF)}
.wrap{padding:72px 72px 72px 88px;height:100%;display:flex;flex-direction:column}
.label{font-size:22px;font-weight:700;color:#00C9A7;margin-bottom:8px}
h2{font-size:44px;font-weight:800;letter-spacing:-1px;margin-bottom:40px;line-height:1.3}
.card-area{flex:1;display:flex;flex-direction:column;gap:28px;justify-content:center}
.card{background:#fff;border-radius:20px;padding:40px 44px;box-shadow:0 2px 16px rgba(0,0,0,.04);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px}
.card.green::before{background:#00C9A7}
.card.blue::before{background:#1B4DFF}
.card h3{font-size:32px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.card h3 .num{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.card.green h3 .num{background:#00C9A7}
.card.blue h3 .num{background:#1B4DFF}
.card p{font-size:26px;color:#666;line-height:1.6}
.card p strong{color:#1A1A2E;font-weight:700}
.card .where{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;border-radius:8px;font-size:20px;font-weight:600;color:#fff}
.card.green .where{background:#00C9A7}
.card.blue .where{background:#1B4DFF}
.bottom{position:absolute;bottom:48px;left:88px;right:72px;display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,.1)}
.dot.active{background:#00C9A7;width:28px;border-radius:5px}
.brand{font-size:20px;font-weight:600;color:rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="wrap">
<div>
<div class="label">필수 2가지</div>
<h2>이사 당일에 해야 할 것</h2>
</div>
<div class="card-area">
<div class="card green">
<h3><span class="num">1</span>전입신고</h3>
<p><strong>이사한 날</strong> 주민센터에서 바로 하세요.<br>"내가 여기 산다"를 등록하는 거예요.<br>이걸 해야 <strong>대항력</strong>(쫓겨나지 않을 권리)이 생겨요.</p>
<div class="where">📍 주민센터 or 정부24 온라인</div>
</div>
<div class="card blue">
<h3><span class="num">2</span>확정일자</h3>
<p>전입신고 하면서 <strong>같이 받으세요</strong>.<br>계약서에 날짜 도장 찍어주는 건데,<br>이게 있어야 <strong>보증금 우선변제권</strong>이 생겨요.</p>
<div class="where">📍 주민센터 · 등기소 · 온라인 (600원)</div>
</div>
</div>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</body>
</html>
