<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #1B4DFF;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* 배경 장식 */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .bg-circle.c1 { width: 700px; height: 700px; top: -100px; right: -200px; }
  .bg-circle.c2 { width: 500px; height: 500px; bottom: -80px; left: -150px; }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 80px;
  }

  .icon {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 44px;
    font-size: 40px;
  }

  .title {
    color: #FFFFFF;
    font-size: 46px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 20px;
    word-break: keep-all;
  }

  .sub {
    color: rgba(255,255,255,0.7);
    font-size: 26px;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 56px;
  }

  .price-box {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 20px 40px;
    margin-bottom: 20px;
  }
  .price-label {
    color: rgba(255,255,255,0.7);
    font-size: 22px;
    font-weight: 500;
  }
  .price-value {
    color: #FFFFFF;
    font-size: 36px;
    font-weight: 900;
  }

  .cta-note {
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    font-weight: 400;
    margin-top: 8px;
  }

  /* 하단 */
  .footer {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .dots {
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dot.active {
    background: #FFFFFF;
    width: 28px;
    border-radius: 5px;
  }
  .brand {
    color: rgba(255,255,255,0.4);
    font-size: 18px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>

  <div class="content">
    <div class="icon">&#10003;</div>
    <h1 class="title">빠진 특약,<br>계약체크가 알려줘요</h1>
    <p class="sub">넣어야 할 문구 예시까지<br>30초 만에 정리해드려요</p>

    <div class="price-box">
      <span class="price-label">얼리버드</span>
      <span class="price-value">9,900원</span>
    </div>
    <p class="cta-note">프로필 링크에서 신청하세요</p>
  </div>

  <div class="footer">
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
    <div class="brand">@contractcheck.kr</div>
  </div>
</body>
</html>
