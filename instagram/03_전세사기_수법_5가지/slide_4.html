<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#F5F5FA;color:#1A1A2E;overflow:hidden;position:relative}
.wrap{padding:70px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.header{display:flex;align-items:center;gap:14px;margin-bottom:36px}
.header-tag{background:#FF3B3B;color:#fff;font-size:22px;font-weight:700;padding:8px 20px;border-radius:6px}
.header-title{font-size:28px;font-weight:700;color:#666}

.card{background:#fff;border-radius:24px;padding:44px;margin-bottom:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:6px;background:#FF3B3B}
.card-num{font-size:64px;font-weight:900;position:absolute;top:26px;right:40px;opacity:.08;line-height:1}
.card-icon{font-size:44px;margin-bottom:14px}
.card-title{font-size:36px;font-weight:900;margin-bottom:12px;line-height:1.3}
.card-title em{font-style:normal;color:#FF3B3B}
.card-desc{font-size:26px;color:#666;line-height:1.6}
.card-desc strong{color:#1A1A2E;font-weight:700}
.card-tip{display:inline-block;margin-top:14px;background:#FFF0F0;color:#FF3B3B;font-size:22px;font-weight:700;padding:8px 18px;border-radius:8px}

.summary{background:#1A1A2E;border-radius:20px;padding:40px 44px;color:#fff}
.summary-title{font-size:28px;font-weight:900;margin-bottom:18px;color:#FF6B6B}
.summary-list{list-style:none;font-size:24px;line-height:2}
.summary-list li{display:flex;align-items:center;gap:12px}
.summary-list li::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF3B3B;flex-shrink:0}
.summary-list li span{color:rgba(255,255,255,.55);font-size:22px}

.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(26,26,46,.15)}
.dot.active{background:#FF3B3B;width:32px;border-radius:6px}
.brand{font-size:22px;font-weight:700;color:rgba(26,26,46,.25)}
</style>
</head>
<body>
<div class="wrap">
<div>
<div class="header">
<span class="header-tag">수법 5 + 정리</span>
<span class="header-title">마지막, 그리고 총정리</span>
</div>

<div class="card">
<div class="card-stripe"></div>
<div class="card-num">05</div>
<div class="card-icon">🏦</div>
<div class="card-title"><em>신탁등기</em>인데 동의 없이 계약</div>
<div class="card-desc">
등기부에 "신탁" 적혀있으면, <strong>신탁사 동의</strong>가 있어야<br>
계약이 유효해요. 동의서 없으면 계약 자체가 무효!
</div>
<div class="card-tip">신탁 여부는 등기부 '을구'에서 확인</div>
</div>

<div class="summary">
<div class="summary-title">5가지 전세사기 수법 정리</div>
<ul class="summary-list">
<li>시세 70% 이하의 의심스러운 저가 전세</li>
<li>공인중개사 없이 직거래 고집</li>
<li>근저당이 집값에 가까울 정도로 많음</li>
<li>계약 당일 즉시 서명 압박</li>
<li>신탁등기인데 신탁사 동의서 없음</li>
</ul>
</div>
</div>

<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
