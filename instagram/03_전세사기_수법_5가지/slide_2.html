<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#F5F5FA;color:#1A1A2E;overflow:hidden;position:relative}
.wrap{padding:70px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.header{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.header-tag{background:#FF3B3B;color:#fff;font-size:22px;font-weight:700;padding:8px 20px;border-radius:6px}
.header-title{font-size:28px;font-weight:700;color:#666}

.card{background:#fff;border-radius:24px;padding:48px;margin-bottom:28px;box-shadow:0 2px 20px rgba(0,0,0,.06);position:relative;overflow:hidden}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
.card-stripe.red{background:#FF3B3B}
.card-stripe.orange{background:#FF8C00}
.card-num{font-size:64px;font-weight:900;position:absolute;top:30px;right:40px;opacity:.08;line-height:1}
.card-icon{font-size:44px;margin-bottom:14px}
.card-title{font-size:36px;font-weight:900;margin-bottom:12px;line-height:1.3}
.card-title em{font-style:normal;color:#FF3B3B}
.card-desc{font-size:26px;color:#666;line-height:1.6}
.card-desc strong{color:#1A1A2E;font-weight:700}
.card-tip{display:inline-block;margin-top:14px;background:#FFF0F0;color:#FF3B3B;font-size:22px;font-weight:700;padding:8px 18px;border-radius:8px}

.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(26,26,46,.15)}
.dot.active{background:#FF3B3B;width:32px;border-radius:6px}
.brand{font-size:22px;font-weight:700;color:rgba(26,26,46,.25)}
</style>
</head>
<body>
<div class="wrap">
<div>
<div class="header">
<span class="header-tag">수법 1~2</span>
<span class="header-title">이런 상황이면 의심하세요</span>
</div>

<div class="card">
<div class="card-stripe red"></div>
<div class="card-num">01</div>
<div class="card-icon">💰</div>
<div class="card-title">시세보다 <em>너무 싼</em> 전세</div>
<div class="card-desc">
주변 시세의 <strong>70% 이하</strong>면 한 번 의심해봐야 해요.<br>
"싸니까 좋은 거 아냐?" — 그게 함정입니다.
</div>
<div class="card-tip">주변 시세는 국토부 실거래가에서 확인!</div>
</div>

<div class="card">
<div class="card-stripe orange"></div>
<div class="card-num">02</div>
<div class="card-icon">🤝</div>
<div class="card-title">집주인이 <em>직거래</em>를 고집</div>
<div class="card-desc">
"중개사 끼면 수수료 아깝잖아요" 하면서<br>
<strong>공인중개사 없이</strong> 계약하자고 하면 조심하세요.
</div>
<div class="card-tip">중개사 = 내 보증금 지키는 안전장치</div>
</div>
</div>

<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
