<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#0A0E27;color:#fff;overflow:hidden;position:relative}
.grain{position:absolute;top:0;left:0;right:0;bottom:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="256" height="256" filter="url(%23n)" opacity="0.04"/></svg>');opacity:.5;pointer-events:none;z-index:10}
.wrap{padding:70px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between;position:relative}
.header{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.header-tag{background:#FF3B3B;color:#fff;font-size:22px;font-weight:700;padding:8px 20px;border-radius:6px}
.header-title{font-size:28px;font-weight:700;color:rgba(255,255,255,.45)}

.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:48px;margin-bottom:28px;position:relative;overflow:hidden;backdrop-filter:blur(10px)}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
.card-stripe.red{background:#FF3B3B}
.card-stripe.orange{background:#FF8C00}
.card-num{font-size:64px;font-weight:900;position:absolute;top:30px;right:40px;opacity:.08;color:#fff;line-height:1}
.card-icon{font-size:44px;margin-bottom:14px}
.card-title{font-size:36px;font-weight:900;margin-bottom:12px;line-height:1.3}
.card-title em{font-style:normal;color:#FF3B3B}
.card-desc{font-size:26px;color:rgba(255,255,255,.6);line-height:1.6}
.card-desc strong{color:#fff;font-weight:700}
.card-tip{display:inline-block;margin-top:14px;background:rgba(255,59,59,.15);color:#FF6B6B;font-size:22px;font-weight:700;padding:8px 18px;border-radius:8px}

.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.2)}
.dot.active{background:#FF3B3B;width:32px;border-radius:6px}
.brand{font-size:22px;font-weight:700;color:rgba(255,255,255,.3)}
</style>
</head>
<body>
<div class="grain"></div>
<div class="wrap">
<div>
<div class="header">
<span class="header-tag">수법 3~4</span>
<span class="header-title">이런 상황이면 의심하세요</span>
</div>

<div class="card">
<div class="card-stripe red"></div>
<div class="card-num">03</div>
<div class="card-icon">📄</div>
<div class="card-title">등기부에 <em>근저당이 가득</em></div>
<div class="card-desc">
빚이 집값에 가까우면 <strong>보증금 못 돌려받을 수 있어요.</strong><br>
"근저당은 형식적인 거예요" — 절대 아닙니다.
</div>
<div class="card-tip">근저당 + 전세보증금 > 집값 80%면 주의!</div>
</div>

<div class="card">
<div class="card-stripe orange"></div>
<div class="card-num">04</div>
<div class="card-icon">⏰</div>
<div class="card-title">계약 당일 <em>바로 사인</em> 압박</div>
<div class="card-desc">
"오늘 안 하면 다른 사람한테 갑니다"<br>
<strong>급하게 서두르는 건 사기꾼의 전형적인 수법</strong>이에요.
</div>
<div class="card-tip">서류 확인할 시간도 안 주면? 거르세요</div>
</div>
</div>

<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
