<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#F5F5F0;color:#111;overflow:hidden;position:relative}
.wrap{padding:80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.label{font-size:24px;font-weight:700;color:#D97706;margin-bottom:12px}
h2{font-size:50px;font-weight:900;line-height:1.3;letter-spacing:-1px;margin-bottom:36px}
.calc-box{background:#fff;border-radius:20px;padding:40px;box-shadow:0 2px 20px rgba(0,0,0,.04);margin-bottom:28px}
.calc-box h3{font-size:30px;font-weight:900;margin-bottom:18px;color:#111}
.formula{background:#F0F4FF;border-radius:14px;padding:24px 28px;font-size:27px;font-weight:700;color:#1B4DFF;text-align:center;margin-bottom:20px;letter-spacing:-.5px}
.example{font-size:25px;color:#555;line-height:1.7}
.example strong{color:#111}
.example .result{color:#1B4DFF;font-weight:900;font-size:28px}
.gauge-section{margin-bottom:8px}
.gauge-title{font-size:22px;font-weight:700;color:#555;margin-bottom:12px}
.gauge{display:flex;border-radius:12px;overflow:hidden;height:60px;font-size:20px;font-weight:700;color:#fff}
.gauge div{display:flex;align-items:center;justify-content:center}
.g1{background:#0AA06E;flex:7}
.g2{background:#D97706;flex:1}
.g3{background:#E8302C;flex:1}
.g4{background:#7C1D1D;flex:1}
.gauge-labels{display:flex;margin-top:10px;margin-bottom:4px}
.gauge-labels span{text-align:center;font-size:20px;font-weight:700}
.gauge-labels span:nth-child(1){flex:7;color:#0AA06E}
.gauge-labels span:nth-child(2){flex:1;color:#D97706}
.gauge-labels span:nth-child(3){flex:1;color:#E8302C}
.gauge-labels span:nth-child(4){flex:1;color:#7C1D1D}
.gauge-desc{display:flex;margin-bottom:6px}
.gauge-desc span{text-align:center;font-size:18px;color:#999}
.gauge-desc span:nth-child(1){flex:7}
.gauge-desc span:nth-child(2){flex:1}
.gauge-desc span:nth-child(3){flex:1}
.gauge-desc span:nth-child(4){flex:1}
.src{font-size:19px;color:#bbb;margin-top:10px}
.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,.12)}
.dot.active{background:#1B4DFF;width:32px;border-radius:6px}
.brand{font-size:22px;font-weight:700;color:rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="wrap">
<div>
<div class="label">핵심 공식</div>
<h2>내 보증금 안전한지<br>이렇게 계산해요</h2>
<div class="calc-box">
<h3>깡통전세 비율 공식</h3>
<div class="formula">(선순위 채권 + 내 보증금) ÷ 집값 × 100</div>
<p class="example">
예) 근저당 <strong>2억</strong> + 보증금 <strong>1.5억</strong> = 3.5억<br>
시세 <strong>5억</strong> 기준 → <span class="result">70% → 양호 구간</span>
</p>
</div>
<div class="gauge-section">
<div class="gauge-title">HUG 전세보증금반환보증 참고 기준</div>
<div class="gauge">
<div class="g1">~70%</div>
<div class="g2">~80%</div>
<div class="g3">~90%</div>
<div class="g4">90%+</div>
</div>
<div class="gauge-labels">
<span>양호</span>
<span>주의 권장</span>
<span>확인 필요</span>
<span>보증보험<br>어려움</span>
</div>
<div class="gauge-desc">
<span></span>
<span></span>
<span></span>
<span></span>
</div>
</div>
<p class="src">출처: HUG 전세보증금반환보증 가입 기준</p>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot active"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
