<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Noto Sans KR',sans-serif;background:#F5F5F0;color:#111;overflow:hidden;position:relative}
.wrap{padding:80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
.label{font-size:24px;font-weight:700;color:#1B4DFF;margin-bottom:12px}
h2{font-size:56px;font-weight:900;line-height:1.3;letter-spacing:-1px;margin-bottom:48px}
.card{background:#fff;border-radius:24px;padding:48px;box-shadow:0 2px 24px rgba(0,0,0,.05)}
.diagram{display:flex;align-items:center;justify-content:center;gap:32px;margin-bottom:40px}
.house-box{text-align:center}
.house-icon{font-size:80px;margin-bottom:8px}
.house-label{font-size:24px;font-weight:700;color:#111}
.house-val{font-size:22px;color:#888;margin-top:4px}
.vs{font-size:36px;font-weight:900;color:#E8302C}
.debt-box{text-align:center}
.debt-stack{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.debt-bar{border-radius:10px;padding:12px 24px;font-size:22px;font-weight:700;color:#fff;text-align:center}
.debt-bank{background:#E8302C}
.debt-deposit{background:#D97706}
.debt-label{font-size:24px;font-weight:700;color:#111;margin-top:4px}
.explain{font-size:28px;color:#555;line-height:1.7;margin-top:32px;border-top:2px solid #E5E5E0;padding-top:28px}
.explain strong{color:#111;font-weight:700}
.explain .highlight{color:#E8302C;font-weight:700}
.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.dots{display:flex;gap:10px}
.dot{width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,.12)}
.dot.active{background:#1B4DFF;width:32px;border-radius:6px}
.brand{font-size:22px;font-weight:700;color:rgba(0,0,0,.2)}
</style>
</head>
<body>
<div class="wrap">
<div>
<div class="label">개념 정리</div>
<h2>깡통전세가 뭔데?</h2>
<div class="card">
<div class="diagram">
<div class="house-box">
<div class="house-icon">🏠</div>
<div class="house-label">집값</div>
<div class="house-val">4억</div>
</div>
<div class="vs">&lt;</div>
<div class="debt-box">
<div class="debt-stack">
<div class="debt-bar debt-bank">🏦 대출(근저당) 2.5억</div>
<div class="debt-bar debt-deposit">💰 내 보증금 2억</div>
</div>
<div class="debt-label">빚 + 보증금</div>
<div class="house-val">4.5억</div>
</div>
</div>
<div class="explain">
<strong>집값보다 빚+보증금이 더 큰 상태</strong>예요.<br>
이러면 경매로 넘어갔을 때<br>
<span class="highlight">내 보증금을 다 못 돌려받을 수 있어요.</span>
</div>
</div>
</div>
<div class="bottom">
<div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>
<div class="brand">@contractcheck.kr</div>
</div>
</div>
</body>
</html>
