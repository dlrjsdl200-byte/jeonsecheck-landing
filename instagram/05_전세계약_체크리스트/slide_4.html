<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>전세계약 체크리스트 - CTA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #1B4DFF;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* 배경 장식 */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
  }
  .bg-circle.c1 { width: 800px; height: 800px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .bg-circle.c2 { width: 560px; height: 560px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
  .bg-circle.c3 { width: 320px; height: 320px; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  .bg-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 80px;
  }

  .check-icon {
    font-size: 64px;
    margin-bottom: 36px;
    display: inline-block;
    width: 100px;
    height: 100px;
    line-height: 100px;
    background: rgba(255,255,255,0.15);
    border-radius: 24px;
  }

  .title {
    font-size: 48px;
    font-weight: 900;
    line-height: 1.4;
    margin-bottom: 24px;
    word-break: keep-all;
  }

  .subtitle {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    margin-bottom: 56px;
    word-break: keep-all;
  }

  .cta-box {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    background: #FFFFFF;
    color: #1B4DFF;
    padding: 24px 56px;
    border-radius: 20px;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .cta-box .price {
    font-size: 36px;
    font-weight: 900;
  }

  .cta-box .original {
    font-size: 22px;
    color: #AAA;
    text-decoration: line-through;
    font-weight: 400;
  }

  .cta-sub {
    font-size: 22px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
  }

  .brand-name {
    margin-top: 48px;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.9);
  }

  /* 하단 */
  .bottom-bar {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }

  .dots {
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
  }
  .dot.active {
    background: #FFFFFF;
    width: 28px;
    border-radius: 5px;
  }

  .brand {
    font-size: 18px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>
<div class="bg-circle c3"></div>

<div class="content">
  <div class="check-icon">&#10003;</div>
  <div class="title">
    이 체크리스트,<br>
    30초면 자동으로<br>
    확인돼요
  </div>
  <div class="subtitle">
    계약서 + 등기부등본 + 건축물대장<br>
    사진만 찍으면 AI가 항목별로 정리해 드려요
  </div>
  <div class="cta-box">
    <span>얼리버드</span>
    <span class="price">9,900원</span>
    <span class="original">14,900원</span>
  </div>
  <div class="cta-sub">서류 항목 자동 확인 도구 (법률 자문 아님)</div>
  <div class="brand-name">계약체크</div>
</div>

<div class="bottom-bar">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
  <div class="brand">@contractcheck.kr</div>
</div>

</body>
</html>
