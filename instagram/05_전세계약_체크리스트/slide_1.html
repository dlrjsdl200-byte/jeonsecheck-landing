<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>전세계약 체크리스트 - 커버</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Noto Sans KR', sans-serif;
    background: #0A0E27;
    color: #FFFFFF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* 배경 장식 */
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(27,77,255,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .grid-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(27,77,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(27,77,255,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 100px;
  }

  .tag {
    display: inline-block;
    background: rgba(27,77,255,0.2);
    border: 1px solid rgba(27,77,255,0.4);
    color: #7BA1FF;
    font-size: 22px;
    font-weight: 500;
    padding: 10px 28px;
    border-radius: 40px;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  .title {
    font-size: 58px;
    font-weight: 900;
    line-height: 1.35;
    margin-bottom: 36px;
    word-break: keep-all;
  }

  .title .highlight {
    color: #5B8AFF;
  }

  .subtitle {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }

  /* 체크 아이콘 장식 */
  .check-deco {
    position: absolute;
    z-index: 1;
    opacity: 0.08;
    font-size: 200px;
  }
  .check-deco.top-right { top: 60px; right: 80px; transform: rotate(15deg); }
  .check-deco.bottom-left { bottom: 120px; left: 60px; transform: rotate(-10deg); }

  /* 하단 */
  .bottom-bar {
    position: absolute;
    bottom: 40px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
    z-index: 10;
  }

  .dots {
    display: flex;
    gap: 10px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .dot.active {
    background: #1B4DFF;
    width: 28px;
    border-radius: 5px;
  }

  .brand {
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="grid-lines"></div>
<div class="check-deco top-right">&#9745;</div>
<div class="check-deco bottom-left">&#9745;</div>

<div class="content">
  <div class="tag">전세계약 체크리스트</div>
  <div class="title">
    도장 찍기 전,<br>
    <span class="highlight">이것만은 꼭</span><br>
    확인하세요
  </div>
  <div class="subtitle">전세계약 최종 체크리스트</div>
</div>

<div class="bottom-bar">
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="brand">@contractcheck.kr</div>
</div>

</body>
</html>
